<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code 実務マニュアル | 完全版</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23111'/><text x='50%25' y='55%25' text-anchor='middle' dominant-baseline='central' font-family='Georgia,serif' font-size='20' fill='white'>e</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Miratuku CI */
      --brown: #7A4033; --brown-dark: #5C2E24; --brown-light: #FAE8DC;
      --terra: #A86B50; --gold: #CEA26F;
      /* Surfaces */
      --bg: #FDFAF7; --surface: #FFFFFF; --surface-2: #F5EFE8;
      /* Text */
      --text: #3D2E22; --text-2: #6B5445; --text-3: #7A7268;
      /* Borders & Shadows */
      --border: #E6D5C4; --border-light: #F0EDE6;
      /* Semantic */
      --accent: var(--brown); --accent-bg: var(--brown-light);
      --code-bg: #F5EFE8; --warn-bg: #FFF8F0; --warn-border: #E8B060;
      --info-bg: #F5F0E8; --info-border: #CEA26F;
      /* Sidebar */
      --sidebar-bg: #F5EFE8; --sidebar-w: 280px;
      /* Shadows (warm-toned, Stripe-inspired) */
      --shadow-sm: 0 0 0 1px rgba(61,46,34,.04), 0 1px 3px rgba(61,46,34,.06);
      --shadow-md: 0 0 0 1px rgba(61,46,34,.04), 0 4px 8px rgba(61,46,34,.06), 0 12px 20px rgba(61,46,34,.04);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      /* UX BP: 17px body, 1.6 line-height */
      line-height: 1.6; font-size: 17px;
      -webkit-font-smoothing: antialiased; font-feature-settings: "palt";
      letter-spacing: 0.01em;
    }

    .layout { display:flex; min-height:100vh; }

    /* Sidebar — Miratuku warm palette */
    .sidebar { width:var(--sidebar-w); background:var(--sidebar-bg); border-right:1px solid var(--border); position:fixed; top:0; left:0; height:100vh; overflow-y:auto; z-index:100; transition:transform .3s; }
    .sidebar::-webkit-scrollbar { width:5px; } .sidebar::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    .sidebar-header { padding:24px 20px 16px; border-bottom:1px solid var(--border); }
    .sidebar-header h1 { font-size:14px; font-weight:700; letter-spacing:.04em; color:var(--text); }
    .sidebar-header p { font-size:11px; color:var(--text-3); margin-top:4px; }
    .sidebar-header .ver { display:inline-block; background:var(--brown); color:#fff; font-size:10px; padding:2px 8px; border-radius:3px; margin-left:6px; letter-spacing:.05em; }
    .nav-section { padding:4px 12px; margin-top:10px; }
    .nav-part { font-size:11px; font-weight:700; color:var(--brown); letter-spacing:.08em; padding:8px 8px 4px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
    .nav-part:hover { color:var(--brown-dark); }
    .nav-part .arrow { transition:transform .2s; font-size:10px; }
    .nav-part .arrow.open { transform:rotate(90deg); }
    .nav-chapters { overflow:hidden; max-height:0; pointer-events:none; transition: max-height .3s ease; }
    .nav-item { display:block; padding:7px 12px 7px 16px; font-size:13px; color:var(--text-2); text-decoration:none; border-radius:6px; cursor:pointer; border:none; background:none; width:100%; text-align:left; font-family:inherit; transition:all .15s; line-height:1.4; }
    .nav-item:hover { background:rgba(122,64,51,.06); color:var(--text); }
    .nav-item.active { background:var(--accent-bg); color:var(--brown); font-weight:600; }

    /* Main — UX BP: max-width 700px (≈65ch), generous padding */
    .main { flex:1; margin-left:var(--sidebar-w); max-width:760px; padding:48px 48px 96px; }
    .chapter { display:none; animation:fadeIn .3s ease; }
    .chapter.active { display:block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* Typography — UX BP: clear hierarchy, warm tones */
    .part-label { font-size:12px; font-weight:600; color:var(--brown); letter-spacing:.1em; }
    /* H2: 24px, Serif for warmth */
    h2 { font-family:'Noto Serif JP','Hiragino Mincho ProN',Georgia,serif; font-size:24px; font-weight:600; line-height:1.35; margin:6px 0 32px; padding-bottom:16px; border-bottom:1.5px solid #E6D5C4; color:var(--text); }
    /* H3: 20px, brown left border */
    h3 { font-size:20px; font-weight:600; margin:48px 0 16px; padding-left:14px; border-left:3px solid var(--brown); line-height:1.4; }
    /* H4: 16px */
    h4 { font-size:16px; font-weight:600; margin:32px 0 12px; color:var(--text); }
    /* Body text — UX BP: 1.5-2em paragraph spacing */
    p { margin-bottom:1.2em; }
    ul,ol { margin-bottom:1.2em; padding-left:24px; }
    li { margin-bottom:8px; line-height:1.6; }
    strong { color:var(--text); }
    hr { border:none; border-top:1px solid var(--border); margin:32px 0; }

    /* Tables — warm theme */
    .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; margin:16px 0 28px; }
    table { width:100%; border-collapse:collapse; font-size:14.5px; }
    th { background:var(--surface-2); font-weight:600; font-size:12px; letter-spacing:.04em; text-align:left; padding:10px 14px; border:1px solid var(--border); color:var(--text-2); }
    td { padding:10px 14px; border:1px solid var(--border); vertical-align:top; line-height:1.5; }
    tr:hover td { background:var(--bg); }

    /* Code — UX BP: distinct from prose, copy-friendly */
    pre { background:var(--code-bg); border-radius:8px; padding:18px 22px; overflow-x:auto; margin:16px 0 24px; font-size:13.5px; line-height:1.65; border:1px solid var(--border); font-family:'JetBrains Mono','SF Mono','Menlo',monospace; color:var(--text); }
    code { font-family:'JetBrains Mono','SF Mono','Menlo',monospace; font-size:.82em; }
    p code, td code, li code { background:var(--code-bg); padding:2px 7px; border-radius:4px; color:var(--brown-dark); }

    /* Callouts — warm tones */
    .callout { border-radius:8px; padding:16px 20px; margin:20px 0 24px; font-size:15px; line-height:1.6; }
    .callout-warn { background:var(--warn-bg); border-left:4px solid var(--warn-border); }
    .callout-info { background:var(--info-bg); border-left:4px solid var(--info-border); }
    .callout b { display:block; font-size:13px; margin-bottom:6px; color:var(--text); letter-spacing:.03em; }

    /* Responsive */
    .hamburger { display:none; position:fixed; top:14px; left:14px; z-index:200; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:9px 11px; cursor:pointer; box-shadow:var(--shadow-sm); }
    .hamburger svg { display:block; }
    .overlay { display:none; position:fixed; inset:0; background:rgba(61,46,34,.25); z-index:90; backdrop-filter:blur(2px); }
    @media(max-width:900px) {
      .sidebar { transform:translateX(-100%); width:280px; }
      .sidebar.open { transform:translateX(0); }
      .hamburger { display:block; }
      .overlay.open { display:block; }
      .main { margin-left:0; padding:60px 24px 80px; font-size:16px; }
      h2 { font-size:22px; }
      h3 { font-size:18px; margin-top:36px; }
    }
    @media print {
      .sidebar,.hamburger,.overlay { display:none!important; }
      .main { margin-left:0; max-width:100%; padding:24px; }
      .chapter { display:block!important; page-break-before:always; }
      .chapter:first-child { page-break-before:auto; }
      body { font-size:12pt; }
    }

    /* Links in content */
    .chapter a { color:var(--brown); text-decoration:underline; text-decoration-color:var(--border); text-underline-offset:3px; transition:all .15s; }
    .chapter a:hover { color:var(--brown-dark); text-decoration-color:var(--brown); }
    .chapter a[target="_blank"]::after { content:' \2197'; font-size:.8em; }

    /* Focus & Accessibility */
    :focus-visible { outline:2px solid var(--terra); outline-offset:2px; }
    ::selection { background:var(--brown-light); color:var(--brown-dark); }

    /* Chat — right side panel, always visible */
    .chat-side {
      position:fixed; top:0; right:0; width:320px; height:100vh; z-index:80;
      background:var(--surface); border-left:1px solid var(--border);
      display:flex; flex-direction:column;
      box-shadow: -2px 0 12px rgba(61,46,34,.04);
    }
    .chat-side-header {
      padding:18px 18px 14px; border-bottom:1px solid var(--border);
    }
    .chat-side-header h3 { font-size:14px; font-weight:600; color:var(--text); }
    .chat-side-header p { font-size:12px; color:var(--text-3); margin-top:3px; line-height:1.5; }

    .chat-messages {
      flex:1; overflow-y:auto; padding:16px;
      display:flex; flex-direction:column; gap:10px;
    }
    .chat-messages::-webkit-scrollbar { width:4px; }
    .chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    .chat-msg {
      max-width:92%; padding:10px 14px; border-radius:12px;
      font-size:13.5px; line-height:1.6; word-break:break-word;
    }
    .chat-msg.user {
      align-self:flex-end; background:var(--brown); color:#fff;
      border-bottom-right-radius:4px;
    }
    .chat-msg.ai {
      align-self:flex-start; background:var(--surface-2); color:var(--text);
      border-bottom-left-radius:4px; border:1px solid var(--border);
    }
    .chat-msg.ai code { background:rgba(122,64,51,.08); padding:1px 4px; border-radius:3px; font-size:.85em; }
    .chat-msg.system {
      align-self:center; background:transparent; color:var(--text-3);
      font-size:12px; text-align:center; padding:4px 8px; line-height:1.6;
    }
    .chat-typing { display:flex; gap:4px; padding:8px 14px; align-self:flex-start; }
    .chat-typing span {
      width:6px; height:6px; border-radius:50%; background:var(--text-3);
      animation: chatBounce .6s infinite alternate;
    }
    .chat-typing span:nth-child(2) { animation-delay:.15s; }
    .chat-typing span:nth-child(3) { animation-delay:.3s; }
    @keyframes chatBounce { to { opacity:.3; transform:translateY(-4px); } }

    .chat-input-row {
      display:flex; gap:8px; padding:12px; border-top:1px solid var(--border);
      align-items:flex-end; background:var(--bg);
    }
    .chat-input {
      flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:10px;
      font-size:14px; font-family:inherit; background:var(--surface); color:var(--text);
      resize:none; line-height:1.4; min-height:42px; max-height:84px;
    }
    .chat-input:focus { outline:none; border-color:var(--terra); box-shadow:0 0 0 3px rgba(168,107,80,.12); }
    .chat-input::placeholder { color:var(--text-3); }
    .chat-send {
      width:42px; height:42px; border-radius:10px; border:none;
      background:var(--brown); color:#fff; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all .15s; flex-shrink:0;
    }
    .chat-send:hover { background:var(--brown-dark); }
    .chat-send:disabled { opacity:.4; cursor:not-allowed; }
    .chat-send svg { width:16px; height:16px; }

    /* Adjust main content to not overlap with chat side */
    .main { max-width:700px; }

    @media(max-width:1200px) {
      .chat-side { display:none; }
    }
    @media print { .chat-side { display:none!important; } }

    /* FAQ Section */
    .chat-faq { border-bottom:1px solid var(--border); }
    .chat-faq-header {
      padding:10px 16px; font-size:12px; font-weight:600; color:var(--text-2);
      cursor:pointer; display:flex; justify-content:space-between; align-items:center;
      background:var(--surface-2); transition:background .15s;
    }
    .chat-faq-header:hover { background:var(--accent-bg); }
    .chat-faq-list { max-height:240px; overflow-y:auto; transition:max-height .3s ease; }
    .chat-faq-list.faq-closed { max-height:0; overflow:hidden; }
    .chat-faq-list::-webkit-scrollbar { width:4px; }
    .chat-faq-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .chat-faq-item {
      padding:10px 16px; border-bottom:1px solid var(--border-light);
      cursor:pointer; font-size:12.5px; transition:background .12s;
    }
    .chat-faq-item:hover { background:var(--bg); }
    .chat-faq-item .faq-q { font-weight:500; color:var(--brown); margin-bottom:0; line-height:1.5; }
    .chat-faq-item .faq-a { color:var(--text-2); line-height:1.5; display:none; margin-top:6px; font-size:12px; }
    .chat-faq-item.open .faq-a { display:block; }
    .faq-empty { padding:10px 16px; font-size:11px; color:var(--text-3); text-align:center; }
    .faq-category-label {
      padding:6px 16px 4px; font-size:10px; font-weight:700; color:var(--brown);
      letter-spacing:.06em; background:var(--bg); border-bottom:1px solid var(--border-light);
      position:sticky; top:0;
    }

    /* Rate Limit */
    .chat-limit-box {
      padding:16px; text-align:center; background:var(--warn-bg);
      border-top:1px solid var(--warn-border);
    }
    .chat-limit-box p { font-size:13px; color:var(--text-2); margin-bottom:6px; line-height:1.5; }
    .chat-limit-box .limit-sub { font-size:11px; color:var(--text-3); margin-bottom:10px; }
    .chat-reg-form { display:flex; gap:6px; }
    .chat-reg-form input {
      flex:1; padding:8px 10px; border:1px solid var(--border); border-radius:6px;
      font-size:13px; font-family:inherit; background:var(--surface);
    }
    .chat-reg-form input:focus { outline:none; border-color:var(--terra); }
    .chat-reg-form button {
      padding:8px 14px; background:var(--brown); color:#fff; border:none;
      border-radius:6px; font-size:13px; cursor:pointer; font-family:inherit; white-space:nowrap;
    }
    .chat-reg-form button:hover { background:var(--brown-dark); }
    .chat-remaining { font-size:11px; color:var(--text-3); text-align:center; padding:4px 12px 0; }
    .chat-registered-badge {
      display:inline-block; background:var(--accent-bg); color:var(--brown);
      font-size:10px; padding:2px 8px; border-radius:3px; margin-left:6px;
    }

    /* Community Section — Premium Design */
    .community-section {
      background:linear-gradient(180deg, var(--surface) 0%, #FAF6F1 100%);
      border:1px solid var(--border); border-radius:16px;
      padding:0; margin:56px 0; box-shadow:var(--shadow-md); overflow:hidden;
    }
    .community-hero {
      padding:40px 36px 0; text-align:center;
    }
    .community-hero .community-label {
      font-size:11px; font-weight:600; color:var(--brown); letter-spacing:.14em;
      margin-bottom:12px; display:block;
    }
    .community-hero h3 {
      font-family:'Noto Serif JP','Hiragino Mincho ProN',Georgia,serif;
      font-size:22px; font-weight:600; margin:0 0 20px; border:none; padding:0;
      color:var(--text); line-height:1.45;
    }
    .community-quote {
      font-family:'Noto Serif JP',Georgia,serif; font-size:14.5px; color:var(--brown-dark);
      line-height:1.75; padding:20px 24px; background:var(--accent-bg); border-radius:10px;
      margin:0 36px 24px; font-style:italic; text-align:center; border:none;
    }
    .community-lead {
      font-size:14.5px; color:var(--text-2); line-height:1.85; padding:0 36px;
      text-align:center; margin-bottom:28px;
    }
    .community-divider {
      width:40px; height:1.5px; background:var(--border); margin:0 auto 28px;
    }
    /* Multi-step form */
    .community-form-wrap { padding:0 36px 36px; }
    .community-step { display:none; animation:comFadeIn .4s ease; }
    .community-step.active { display:block; }
    @keyframes comFadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .community-form-wrap .com-field {
      position:relative; margin-bottom:16px;
    }
    .community-form-wrap .com-input {
      width:100%; padding:18px 16px 8px; border:1.5px solid var(--border); border-radius:10px;
      font-size:15px; font-family:inherit; background:var(--surface); color:var(--text);
      transition:border-color .2s, box-shadow .2s;
    }
    .community-form-wrap .com-input:focus {
      outline:none; border-color:var(--brown);
      box-shadow:0 0 0 3px rgba(122,64,51,.08);
    }
    .community-form-wrap .com-label {
      position:absolute; top:14px; left:16px; font-size:14px; color:var(--text-3);
      transition:all .2s ease; pointer-events:none; transform-origin:left top;
    }
    .community-form-wrap .com-input:focus ~ .com-label,
    .community-form-wrap .com-input:not(:placeholder-shown) ~ .com-label {
      transform:translateY(-10px) scale(.78); color:var(--brown); font-weight:500;
    }
    .community-form-wrap .com-row { display:flex; gap:12px; }
    .community-form-wrap .com-row .com-field { flex:1; }
    .com-btn {
      width:100%; padding:14px 24px; border:none; border-radius:10px;
      font-size:15px; font-weight:600; font-family:inherit; cursor:pointer;
      transition:all .2s ease; letter-spacing:.02em;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .com-btn-primary {
      background:var(--brown); color:#fff;
      box-shadow:0 2px 8px rgba(122,64,51,.2);
    }
    .com-btn-primary:hover {
      background:var(--brown-dark); transform:translateY(-1px);
      box-shadow:0 4px 16px rgba(122,64,51,.25);
    }
    .com-btn-primary:active { transform:translateY(0); }
    .com-btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .com-btn-primary .btn-arrow { transition:transform .2s; }
    .com-btn-primary:hover .btn-arrow { transform:translateX(3px); }
    .com-consent {
      font-size:12px; color:var(--text-3); line-height:1.6; display:flex;
      align-items:flex-start; gap:10px; margin:4px 0 16px;
    }
    .com-consent input[type="checkbox"] {
      margin-top:2px; flex-shrink:0; width:16px; height:16px; accent-color:var(--brown);
    }
    .com-trust {
      text-align:center; font-size:11.5px; color:var(--text-3); margin-top:12px; line-height:1.5;
    }
    /* Step indicator */
    .com-steps-indicator {
      display:flex; justify-content:center; gap:8px; margin-bottom:20px;
    }
    .com-step-dot {
      width:8px; height:8px; border-radius:50%; background:var(--border); transition:all .3s;
    }
    .com-step-dot.active { background:var(--brown); width:24px; border-radius:4px; }
    /* Success state */
    .community-success {
      text-align:center; padding:40px 36px; display:none;
      animation:comFadeIn .5s ease;
    }
    .community-success .success-icon {
      width:56px; height:56px; border-radius:50%; background:var(--accent-bg);
      margin:0 auto 16px; display:flex; align-items:center; justify-content:center;
      animation:successPop .5s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes successPop { 0%{transform:scale(0)} 60%{transform:scale(1.1)} 100%{transform:scale(1)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    .community-success .success-icon svg { width:24px; height:24px; color:var(--brown); }
    .community-success h4 {
      font-family:'Noto Serif JP',Georgia,serif;
      font-size:18px; color:var(--text); margin-bottom:10px; font-weight:600;
    }
    .community-success p { font-size:14px; color:var(--text-2); line-height:1.75; }
    @media(max-width:640px) {
      .community-hero { padding:28px 24px 0; }
      .community-quote { margin:0 24px 20px; padding:16px; }
      .community-lead { padding:0 24px; }
      .community-form-wrap { padding:0 24px 28px; }
      .community-form-wrap .com-row { flex-direction:column; }
      .community-success { padding:28px 24px; }
    }

    /* Diagrams */
    .diagram { margin:24px 0; border-radius:10px; overflow:hidden; border:1px solid var(--border); background:var(--surface); }
    .diagram-title { background:var(--sidebar-bg); padding:10px 16px; font-size:12px; font-weight:600; color:var(--text-2); border-bottom:1px solid var(--border); letter-spacing:.03em; }
    .diagram-body { padding:24px; }

    /* Flow diagram */
    .flow-diagram { display:flex; align-items:center; gap:0; flex-wrap:wrap; justify-content:center; }
    .flow-d-step { display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 8px; min-width:90px; }
    .flow-d-icon { width:52px; height:52px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; }
    .flow-d-label { font-size:11.5px; font-weight:500; text-align:center; line-height:1.4; }
    .flow-d-sub { font-size:10px; color:var(--text-3); text-align:center; }
    .flow-d-arrow { font-size:18px; color:var(--border); margin:0 2px; padding-top:4px; }
    .flow-d-icon.blue { background:#FAE8DC; color:#7A4033; }
    .flow-d-icon.green { background:#F5EFE8; color:#A86B50; }
    .flow-d-icon.orange { background:#FFF4EC; color:#CEA26F; }
    .flow-d-icon.red { background:#fde8e8; color:var(--accent); }
    .flow-d-icon.gray { background:var(--sidebar-bg); color:var(--text-2); }
    .flow-d-icon.dark { background:var(--text); color:#fff; }

    /* Architecture diagram */
    .arch { display:flex; align-items:stretch; gap:16px; flex-wrap:wrap; justify-content:center; }
    .arch-box { flex:1; min-width:160px; max-width:240px; border-radius:10px; padding:20px 16px; text-align:center; }
    .arch-box.local { background:#FAF4EE; border:2px solid #E6D5C4; }
    .arch-box.cloud { background:#F5EFE8; border:2px solid #D4C0AE; }
    .arch-box.public { background:#FFF4EC; border:2px solid #CEA26F; }
    .arch-icon { font-size:28px; margin-bottom:8px; }
    .arch-label { font-size:14px; font-weight:600; margin-bottom:4px; }
    .arch-desc { font-size:11.5px; color:var(--text-2); line-height:1.6; }
    .arch-arrow { display:flex; align-items:center; font-size:24px; color:var(--text-3); }

    /* Screen mockup */
    .mockup { background:#1e1e2e; border-radius:10px; overflow:hidden; color:#cdd6f4; font-family:'JetBrains Mono',monospace; font-size:12px; }
    .mockup-bar { background:#181825; padding:6px 12px; display:flex; gap:6px; align-items:center; }
    .mockup-dot { width:10px; height:10px; border-radius:50%; }
    .mockup-dot.r { background:#f38ba8; } .mockup-dot.y { background:#f9e2af; } .mockup-dot.g { background:#a6e3a1; }
    .mockup-body { display:grid; grid-template-columns:180px 1fr 240px; min-height:200px; }
    .mockup-panel { padding:12px; border-right:1px solid #313244; }
    .mockup-panel:last-child { border-right:none; background:#1a1a2e; }
    .mockup-panel-title { font-size:10px; color:#6c7086; margin-bottom:8px; letter-spacing:.08em; }
    .mockup-file { padding:3px 8px; border-radius:4px; margin:2px 0; font-size:11px; cursor:default; }
    .mockup-file.active { background:#313244; color:#cba6f7; }
    .mockup-code { color:#a6e3a1; }
    .mockup-comment { color:#6c7086; }
    .mockup-chat { font-family:'Noto Sans JP',sans-serif; }
    .mockup-chat-msg { background:#313244; border-radius:8px; padding:8px 10px; margin:4px 0; font-size:11px; line-height:1.5; }
    .mockup-chat-msg.user { background:#45475a; }
    .mockup-chat-msg.ai { border:1px solid #45475a; background:transparent; }

    /* Decision tree */
    .decision { display:flex; flex-direction:column; gap:12px; }
    .decision-q { background:var(--accent-bg); border:1px solid rgba(196,75,43,.2); border-radius:8px; padding:12px 16px; font-size:13px; font-weight:500; text-align:center; }
    .decision-branches { display:flex; gap:12px; }
    .decision-branch { flex:1; border-radius:8px; padding:14px; text-align:center; border:1px solid var(--border); }
    .decision-branch .label { font-size:11px; color:var(--text-3); margin-bottom:4px; }
    .decision-branch .answer { font-size:14px; font-weight:600; margin-bottom:4px; }
    .decision-branch .detail { font-size:11.5px; color:var(--text-2); line-height:1.5; }

    /* Concept card */
    .concept-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin:20px 0; }
    .concept-card { border-radius:10px; padding:18px; border:1px solid var(--border); }
    .concept-card .icon { font-size:24px; margin-bottom:8px; }
    .concept-card .title { font-size:14px; font-weight:600; margin-bottom:6px; }
    .concept-card .body { font-size:12.5px; color:var(--text-2); line-height:1.6; }

    @media(max-width:640px) {
      .mockup-body { grid-template-columns:1fr; }
      .mockup-panel:first-child { display:none; }
      .arch { flex-direction:column; align-items:center; }
      .arch-arrow { transform:rotate(90deg); }
      .flow-diagram { flex-direction:column; }
      .flow-d-arrow { transform:rotate(90deg); }
      .decision-branches { flex-direction:column; }
    }

    /* Search */
    .search-box { padding:12px 16px; border-bottom:1px solid var(--border); }
    .search-box input { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:6px; font-size:12.5px; background:var(--surface); font-family:inherit; }
    .search-box input:focus { outline:none; border-color:var(--accent); }

    /* Copy button on code blocks */
    .code-wrapper { position:relative; }
    .copy-btn {
      position:absolute; top:8px; right:8px; padding:5px 12px; border:1px solid var(--border);
      border-radius:6px; background:var(--surface); font-size:12px; font-family:inherit;
      color:var(--text-2); cursor:pointer; transition:all .18s; z-index:2; opacity:.75;
      box-shadow: var(--shadow-sm);
    }
    .copy-btn:hover { opacity:1; border-color:var(--brown); color:var(--brown); }
    .copy-btn.copied { background:var(--brown); color:#fff; border-color:var(--brown); opacity:1; }

    /* Glossary tooltip */
    .term {
      border-bottom:1.5px dashed var(--terra); cursor:help; position:relative;
      color:inherit; font-weight:inherit;
    }
    .term-popup {
      display:none; position:absolute; bottom:calc(100% + 10px); left:50%; transform:translateX(-50%);
      width:300px; padding:16px 18px; background:var(--text); color:#F5EFE8; border-radius:10px;
      font-size:14px; line-height:1.65; font-weight:400; z-index:1000;
      box-shadow: var(--shadow-md), 0 8px 24px rgba(61,46,34,.2); pointer-events:none;
    }
    .term-popup::after {
      content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
      border:7px solid transparent; border-top-color:var(--text);
    }
    .term-popup b { color:var(--gold); font-weight:600; display:block; margin-bottom:5px; font-size:12px; letter-spacing:.06em; }
    .term.show .term-popup { display:block; pointer-events:auto; }

    /* Popup position fix for right edge */
    .term-popup.flip-left { left:auto; right:0; transform:none; }
    .term-popup.flip-left::after { left:auto; right:16px; transform:none; }
    .term-popup.flip-bottom { bottom:auto; top:calc(100% + 8px); }
    .term-popup.flip-bottom::after { top:auto; bottom:100%; border-top-color:transparent; border-bottom-color:var(--text); }
  </style>
</head>
<body>

  </button>
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <div class="layout">

    <div class="main" id="main-content"></div>
  </div>

  <!-- Chat Side Panel (always visible on right) -->
  <aside class="chat-side" id="chatSide">
    <div class="chat-side-header">

      <textarea class="chat-input" id="chatInput" placeholder="ここに質問を入力... (⌘+Enterで送信)" rows="1"
        onkeydown="if(event.key==='Enter'&&(event.metaKey||event.ctrlKey)){event.preventDefault();sendChat()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,84)+'px'"></textarea>
      <button class="chat-send" id="chatSend" onclick="sendChat()" title="送信">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>

  <script src="manual-data.js"></script>
  <script>
    let currentChapter = null;
    const openParts = new Set();

    function buildNav() {
      const container = document.getElementById('nav-container');
      let html = '';
      for (const part of MANUAL.parts) {
        html += `<div class="nav-section" data-part="${part.id}">`;
        html += `<div class="nav-part" onclick="togglePart('${part.id}')">
          <span>${part.title}</span>
          <span class="arrow" id="arrow-${part.id}">&#9654;</span>
        </div>`;
        html += `<div class="nav-chapters" id="chapters-${part.id}" style="max-height:0">`;
        for (const ch of part.chapters) {
          html += `<button class="nav-item" id="nav-${ch.id}" onclick="showChapter('${ch.id}')" data-title="${ch.title}">${ch.title}</button>`;
        }
        html += `</div></div>`;
      }
      container.innerHTML = html;
    }

    function togglePart(partId) {
      const el = document.getElementById('chapters-' + partId);
      const arrow = document.getElementById('arrow-' + partId);
      if (openParts.has(partId)) {
        openParts.delete(partId);
        el.style.maxHeight = '0';
        el.style.pointerEvents = 'none';
        arrow.classList.remove('open');
      } else {
        openParts.add(partId);
        el.style.maxHeight = el.scrollHeight + 'px';
        el.style.pointerEvents = 'auto';
        arrow.classList.add('open');
      }
    }

    function showChapter(chId) {
      // Close any open glossary popups
      document.querySelectorAll('.term.show').forEach(t => t.classList.remove('show'));

      // Find chapter data
      let chData = null, partData = null;
      for (const p of MANUAL.parts) {
        for (const c of p.chapters) {
          if (c.id === chId) { chData = c; partData = p; break; }
        }
        if (chData) break;
      }
      if (!chData) return;

      // Open parent part
      if (!openParts.has(partData.id)) togglePart(partData.id);

      // Update nav
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const navEl = document.getElementById('nav-' + chId);
      if (navEl) navEl.classList.add('active');

      // Render content
      const main = document.getElementById('main-content');
      let contentHtml = renderMarkdown(chData.content);
      contentHtml = applyGlossary(contentHtml);
      main.innerHTML = `<div class="chapter active">
        <div class="part-label">${partData.title}</div>
        ${contentHtml}
      </div>`;
      addCopyButtons();
      window.scrollTo(0, 0);
      currentChapter = chId;

      if (window.innerWidth <= 900) toggleSidebar();
    }

    function renderMarkdown(md) {
      // Simple markdown-to-HTML converter
      let html = md.trim();

      // Code blocks
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
      });

      // Inline code (must come after code blocks)
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Headers
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');

      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

      // Tables
      html = html.replace(/((?:\|.+\|\n)+)/g, (match) => {
        const rows = match.trim().split('\n');
        if (rows.length < 2) return match;
        let table = '<table>';
        const headerCells = rows[0].split('|').filter(c => c.trim());
        table += '<thead><tr>' + headerCells.map(c => `<th>${c.trim()}</th>`).join('') + '</tr></thead>';
        const startIdx = rows[1].trim().match(/^[\|\-\s]+$/) ? 2 : 1;
        table += '<tbody>';
        for (let i = startIdx; i < rows.length; i++) {
          const cells = rows[i].split('|').filter(c => c.trim() !== '');
          if (cells.length === 0) continue;
          table += '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
        }
        table += '</tbody></table>';
        return `<div class="table-wrap">${table}</div>`;
      });

      // Callout blocks (custom syntax: lines starting with > )
      // Not implementing full callout for now

      // Paragraphs - wrap remaining text
      html = html.replace(/^(?!<[hptuo]|<li|<table|<thead|<tbody|<tr|<div|<pre|<code)((?:(?!<[hptuo]|<li|<table|<pre).+\n?)+)/gm, (match) => {
        const trimmed = match.trim();
        if (!trimmed || trimmed.startsWith('<')) return match;
        return `<p>${trimmed}</p>\n`;
      });

      // Ordered lists
      html = html.replace(/((?:^\d+\..+\n?)+)/gm, (match) => {
        const items = match.trim().split('\n').map(l => l.replace(/^\d+\.\s*/, ''));
        return '<ol>' + items.map(i => `<li>${i}</li>`).join('') + '</ol>';
      });

      // Unordered lists
      html = html.replace(/((?:^- .+\n?)+)/gm, (match) => {
        const items = match.trim().split('\n').map(l => l.replace(/^- /, ''));
        return '<ul>' + items.map(i => `<li>${i}</li>`).join('') + '</ul>';
      });

      // Horizontal rules
      html = html.replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:28px 0">');

      return html;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // =========================================================
    // Glossary — term definitions for popup tooltips
    // =========================================================
    const GLOSSARY = {
      'Homebrew': 'Macにソフトウェアを簡単にインストールするためのツール。App Storeのターミナル版。',

      'Hooks': 'ツール実行の前後に自動で走るシェルスクリプト。品質チェックや通知の自動化に使う。',

      'サブエージェント': 'メインのAIが呼び出す専門AIのこと。調査・レビュー・セキュリティ監査など特定のタスクを委任できる。',
      'コンテキストウィンドウ': 'AIが一度に扱える情報量の上限。作業デスクの広さに例えられる。長い会話では自動圧縮される。',
      'Rules': 'CLAUDE.mdの拡張機能。~/.claude/rules/フォルダに条件付きルールファイルを配置できる。',
      'Plan Mode': 'AIに「まず計画だけ立てて実行はまだしないで」と伝えるモード。Shift+Tabで切替。大きな変更前に方針確認に使う。',
      'MCP': 'Model Context Protocol。AIに外部ツール（GitHub, Slack, Notion等）を使う能力を追加する仕組み。',
      'settings.json': 'Claude Codeの設定ファイル。権限の許可リスト、Hooks、その他の動作設定を記述する。',
      'コンパクト': '/compactコマンドで会話を圧縮（要約）すること。長いセッションでコンテキストを節約する。',
      'MVP': 'Minimum Viable Product。最小限の機能で動くバージョン。まず公開して使いながら改善する手法。',
    };

    function applyGlossary(html) {
      // Sort terms by length (longest first) to avoid partial matches
      const terms = Object.keys(GLOSSARY).sort((a, b) => b.length - a.length);
      for (const term of terms) {
        const def = GLOSSARY[term].replace(/"/g, '&quot;');
        // Only replace terms in text content (not inside tags, code blocks, or existing terms)
        // Use a regex that avoids matching inside HTML tags or <code>/<pre> blocks
        const escapedTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(
          `(?<![<\\/\\w])(?<!<code>)(?<!<pre>)(${escapedTerm})(?![^<]*>)(?!</code>)(?!</pre>)`,
          ''  // only first occurrence per render
        );
        html = html.replace(regex, `<span class="term" onclick="toggleTerm(this)">$1<span class="term-popup"><b>${term}</b>${GLOSSARY[term]}</span></span>`);
      }
      return html;
    }

    function toggleTerm(el) {
      // Close any other open terms
      document.querySelectorAll('.term.show').forEach(t => { if (t !== el) t.classList.remove('show'); });
      el.classList.toggle('show');
      // Position fix: if popup goes off screen
      const popup = el.querySelector('.term-popup');
      if (popup) {
        popup.classList.remove('flip-left','flip-bottom');
        const rect = popup.getBoundingClientRect();
        if (rect.right > window.innerWidth - 16) popup.classList.add('flip-left');
        if (rect.top < 8) popup.classList.add('flip-bottom');
      }
    }

    // Close popups when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.term')) {
        document.querySelectorAll('.term.show').forEach(t => t.classList.remove('show'));
      }
    });

    // =========================================================
    // Copy buttons for code blocks
    // =========================================================
    function addCopyButtons() {
      document.querySelectorAll('pre').forEach(pre => {
        if (pre.querySelector('.copy-btn')) return; // already has button
        const wrapper = document.createElement('div');
        wrapper.className = 'code-wrapper';
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);

        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'コピー';
        btn.onclick = () => {
          const code = pre.querySelector('code') ? pre.querySelector('code').textContent : pre.textContent;
          navigator.clipboard.writeText(code).then(() => {
            btn.textContent = 'コピーしました';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1500);
          });
        };
        wrapper.appendChild(btn);
      });
    }

    function filterNav(q) {
      q = q.toLowerCase();
      document.querySelectorAll('.nav-item').forEach(item => {
        const title = item.dataset.title.toLowerCase();
        item.style.display = !q || title.includes(q) ? '' : 'none';
      });
      if (q) {
        MANUAL.parts.forEach(p => { if (!openParts.has(p.id)) togglePart(p.id); });
      }
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('open');
    }

    // Init
    buildNav();

    // Check if navigated from index.html with a target chapter
    const targetChapter = sessionStorage.getItem('openChapter') || location.hash.replace('#','');
    if (targetChapter) {
      sessionStorage.removeItem('openChapter');
      sessionStorage.removeItem('openPart');
      showChapter(targetChapter);
    } else {
      const firstPart = MANUAL.parts[0];
      togglePart(firstPart.id);
      showChapter(firstPart.chapters[0].id);
    }

    // Handle hash navigation (back/forward, direct URL access)
    window.addEventListener('hashchange', () => {
      const chId = location.hash.replace('#', '');
      if (chId) showChapter(chId);
    });

    // =========================================================
    // Chat — FAQ Accumulation + Rate Limiting
    // =========================================================
    const chatHistory = [];
    const FAQ_STORAGE_KEY = 'ccmanual_faq';
    const USAGE_STORAGE_KEY = 'ccmanual_usage';
    const REG_STORAGE_KEY = 'ccmanual_registered';
    const LIMIT_ANONYMOUS = 3;
    const LIMIT_REGISTERED = 10;

    // --- FAQ Categories ---
    const FAQ_CATEGORIES = [
      { id: 'basic', label: '基本' },
      { id: 'setup', label: '環境構築' },
      { id: 'dev', label: 'アプリ開発' },
      { id: 'publish', label: '公開・運用' },
      { id: 'trouble', label: 'トラブル' },
      { id: 'other', label: 'その他' },
    ];
    // Map part IDs to FAQ categories
    const PART_TO_CATEGORY = {
      'intro': 'basic', 'setup': 'setup', 'first-app': 'dev',
      'publish': 'publish', 'trouble': 'trouble', 'expand': 'dev', 'advanced': 'other',
    };

    // --- Preset FAQs (always shown) ---
    const PRESET_FAQS = [
      { cat: 'basic', q: 'Claude Codeは無料で使えますか？', a: 'Claude Code本体はClaude Proプラン（月額約$20）またはAPI従量課金が必要です。GitHub、Vercelなどの周辺サービスは無料枠で始められます。' },
      { cat: 'basic', q: 'プログラミングの知識がなくても使えますか？', a: 'はい。日本語で「こういうものが欲しい」と伝えるだけで、AIがコードを書いてくれます。コードの中身を理解する必要はありません。ただし「何を作りたいか」を具体的に伝える力は必要です。' },
      { cat: 'setup', q: 'ターミナルとは何ですか？', a: 'ターミナルは、文字を入力してパソコンに指示を出すアプリです。MacにはじめからインストールされていてCommand+Spaceで「ターミナル」と検索すると開けます。Claude Codeはこの中で動きます。' },
      { cat: 'setup', q: 'Homebrewとは何ですか？', a: 'Homebrewは、Macにソフトウェアを簡単にインストールするためのツールです。App Storeのターミナル版と考えてください。Claude Codeの環境構築で必要な他のソフトをインストールするために使います。' },
      { cat: 'setup', q: 'APIキーとは何ですか？', a: 'APIキーは、外部サービスを使うための「鍵」です。パスワードのようなもので、これがないとアプリからAIやメール送信などのサービスを利用できません。漏洩すると悪用されるリスクがあるため、安全に保管する必要があります。' },
      { cat: 'publish', q: 'GitHubとVercelの違いは？', a: 'GitHubは作ったファイルの「保管場所」です。パソコンが壊れてもファイルが残ります。Vercelはアプリを「インターネットに公開する場所」です。GitHubに保存したファイルを読み取り、URLを発行して誰でもアクセスできるようにしてくれます。' },
      { cat: 'trouble', q: 'エラーが出たらどうすればいいですか？', a: 'エラーメッセージをそのままClaude Codeに貼り付けて「このエラーを修正してください」と伝えてください。多くの場合、AIが原因を特定して修正してくれます。赤い文字が出ても慌てる必要はありません。' },
      { cat: 'publish', q: '作ったアプリが壊れたら戻せますか？', a: 'はい。GitHubに保存してあれば、いつでも前の状態に戻せます。Claude Codeに「前回のコミットに戻して」と伝えてください。' },
      { cat: 'dev', q: 'どんなアプリが作れますか？', a: '経費管理、イベント参加者管理、アンケート集計、文献管理、ダッシュボードなど、データの入力・表示・検索を行うWebアプリが得意です。30分〜数時間で基本形が完成します。' },
      { cat: 'dev', q: '「まず計画を見せて」とは？', a: '大きな変更をする前にAIに方針を確認するための言葉です。AIが「こう作ります」と計画を提示してくれるので、方向性が正しいか確認してからOKを出せます。手戻りが大幅に減ります。' },
    ];

    // --- FAQ Management ---
    function loadFaqs() {
      try { return JSON.parse(localStorage.getItem(FAQ_STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function getCurrentCategory() {
      if (!currentChapter) return 'other';
      for (const p of MANUAL.parts) {
        for (const c of p.chapters) {
          if (c.id === currentChapter) return PART_TO_CATEGORY[p.id] || 'other';
        }
      }
      return 'other';
    }
    function getAllFaqs() {
      const userFaqs = loadFaqs();
      return [...userFaqs, ...PRESET_FAQS];
    }
    function saveFaqEntry(q, a) {
      const faqs = loadFaqs();
      const isDuplicate = faqs.some(f => f.q.length > 10 && q.includes(f.q.slice(0, 20)));
      if (!isDuplicate) {
        faqs.unshift({ q, a, ts: Date.now(), cat: getCurrentCategory() });
        if (faqs.length > 50) faqs.length = 50;
        localStorage.setItem(FAQ_STORAGE_KEY, JSON.stringify(faqs));
      }
      renderFaqs();
    }
    function renderFaqs() {
      const allFaqs = getAllFaqs();
      const listEl = document.getElementById('faqList');
      const countEl = document.getElementById('faqCount');
      countEl.textContent = allFaqs.length;

      // Group by category
      const grouped = {};
      for (const cat of FAQ_CATEGORIES) grouped[cat.id] = [];
      for (const f of allFaqs) {
        const catId = f.cat || 'other';
        if (!grouped[catId]) grouped[catId] = [];
        grouped[catId].push(f);
      }

      let html = '';
      for (const cat of FAQ_CATEGORIES) {
        const items = grouped[cat.id];
        if (items.length === 0) continue;
        html += `<div class="faq-category-label">${escapeHtml(cat.label)}</div>`;
        html += items.map(f => `
          <div class="chat-faq-item" onclick="this.classList.toggle('open')">
            <div class="faq-q">Q. ${escapeHtml(f.q.slice(0, 80))}${f.q.length > 80 ? '...' : ''}</div>
            <div class="faq-a">${escapeHtml(f.a).replace(/\n/g, '<br>')}</div>
          </div>
        `).join('');
      }
      listEl.innerHTML = html;
    }
    function toggleFaqPanel() {
      const list = document.getElementById('faqList');
      const arrow = document.getElementById('faqArrow');
      const isOpen = !list.classList.contains('faq-closed');
      if (isOpen) {
        list.classList.add('faq-closed');
        list.style.maxHeight = '0';
        arrow.style.transform = 'rotate(0deg)';
      } else {
        list.classList.remove('faq-closed');
        list.style.maxHeight = '240px';
        arrow.style.transform = 'rotate(90deg)';
      }
    }

    // --- Rate Limiting ---
    function getUsageCount() {
      return parseInt(localStorage.getItem(USAGE_STORAGE_KEY) || '0', 10);
    }
    function incrementUsage() {
      const count = getUsageCount() + 1;
      localStorage.setItem(USAGE_STORAGE_KEY, String(count));
      return count;
    }
    function isRegistered() {
      return !!localStorage.getItem(REG_STORAGE_KEY);
    }
    function getLimit() {
      return isRegistered() ? LIMIT_REGISTERED : LIMIT_ANONYMOUS;
    }
    function updateRemainingDisplay() {
      const remaining = getLimit() - getUsageCount();
      const el = document.getElementById('chatRemaining');
      if (remaining <= 0) {
        el.textContent = '';
        showLimitReached();
      } else {
        el.textContent = `残り${remaining}回`;
      }
    }
    function showLimitReached() {
      if (isRegistered()) {
        // Registered user hit 10 limit
        document.getElementById('chatLimitBox').style.display = 'block';
        document.getElementById('chatLimitBox').innerHTML = '<p>本日の回答上限（10回）に達しました</p><p class="limit-sub">上のFAQもご活用ください。明日またご利用いただけます。</p>';
        document.getElementById('chatInputRow').style.display = 'none';
      } else {
        // Anonymous user hit 3 limit
        document.getElementById('chatLimitBox').style.display = 'block';
        document.getElementById('chatInputRow').style.display = 'none';
      }
    }
    function registerUser() {
      const email = document.getElementById('regEmail').value.trim();
      if (!email || !email.includes('@')) {
        alert('有効なメールアドレスを入力してください');
        return;
      }
      localStorage.setItem(REG_STORAGE_KEY, email);
      document.getElementById('chatLimitBox').style.display = 'none';
      document.getElementById('chatInputRow').style.display = 'flex';
      document.getElementById('regBadge').style.display = 'inline-block';
      updateRemainingDisplay();
    }

    // --- Init UI state ---
    function initChatUI() {
      renderFaqs();
      if (isRegistered()) {
        document.getElementById('regBadge').style.display = 'inline-block';
      }
      if (getUsageCount() >= getLimit()) {
        showLimitReached();
      }
      updateRemainingDisplay();
    }

    function getCurrentChapterContent() {
      if (!currentChapter) return '';
      for (const p of MANUAL.parts) {
        for (const c of p.chapters) {
          if (c.id === currentChapter) {
            return `[${p.title} > ${c.title}]\n` + c.content.replace(/<[^>]+>/g, '').trim();
          }
        }
      }
      return '';
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const question = input.value.trim();
      if (!question) return;

      // Check rate limit before sending
      if (getUsageCount() >= getLimit()) {
        showLimitReached();
        return;
      }

      // Check if FAQ already has an answer
      const faqs = getAllFaqs();
      const qLower = question.toLowerCase();
      const faqMatch = faqs.find(f => {
        const fqLower = f.q.toLowerCase();
        // Simple overlap check: if >60% of words match
        const qWords = qLower.split(/\s+/).filter(w => w.length > 2);
        const fWords = fqLower.split(/\s+/).filter(w => w.length > 2);
        if (qWords.length === 0 || fWords.length === 0) return false;
        const overlap = qWords.filter(w => fWords.some(fw => fw.includes(w) || w.includes(fw)));
        return overlap.length / Math.max(qWords.length, 1) > 0.6;
      });

      const messagesEl = document.getElementById('chatMessages');
      const sendBtn = document.getElementById('chatSend');

      // Add user message
      chatHistory.push({ role: 'user', content: question });
      messagesEl.innerHTML += `<div class="chat-msg user">${escapeHtml(question)}</div>`;
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      // If FAQ match found, show it without API call
      if (faqMatch) {
        let answerHtml = escapeHtml(faqMatch.a)
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\n/g, '<br>');
        messagesEl.innerHTML += `<div class="chat-msg ai">${answerHtml}<br><span style="font-size:11px;color:var(--text-3)">(FAQ より回答 / API未使用)</span></div>`;
        sendBtn.disabled = false;
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return;
      }

      // Add typing indicator
      messagesEl.innerHTML += `<div class="chat-typing" id="chatTyping"><span></span><span></span><span></span></div>`;
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const context = getCurrentChapterContent();
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question,
            context: context.slice(0, 4000),
            history: chatHistory.slice(-6),
          }),
        });

        const typing = document.getElementById('chatTyping');
        if (typing) typing.remove();

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        const data = await res.json();
        chatHistory.push({ role: 'assistant', content: data.answer });

        // Save to FAQ
        saveFaqEntry(question, data.answer);

        // Increment usage
        incrementUsage();
        updateRemainingDisplay();

        // Render answer
        let answerHtml = escapeHtml(data.answer)
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\n/g, '<br>');
        messagesEl.innerHTML += `<div class="chat-msg ai">${answerHtml}</div>`;
      } catch (e) {
        const typing = document.getElementById('chatTyping');
        if (typing) typing.remove();
        messagesEl.innerHTML += `<div class="chat-msg system">回答を取得できませんでした: ${escapeHtml(e.message)}</div>`;
      }

      sendBtn.disabled = false;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Init chat UI after page load
    initChatUI();

    // =========================================================
    // Community Registration
    // =========================================================
    // --- Community Multi-step Form ---
    function comNextStep(s) {
      const email = document.getElementById('comEmail' + s).value.trim();
      if (!email || !email.includes('@')) {
        const input = document.getElementById('comEmail' + s);
        input.style.borderColor = '#c0392b';
        input.focus();
        setTimeout(() => input.style.borderColor = '', 2000);
        return;
      }
      // Transition to step 2
      document.getElementById('comStep1' + s).classList.remove('active');
      document.getElementById('comStep2' + s).classList.add('active');
      document.getElementById('comDot1' + s).classList.remove('active');
      document.getElementById('comDot2' + s).classList.add('active');
      document.getElementById('comName' + s).focus();
    }

    async function submitCommunityForm(suffix) {
      const s = suffix || '';
      const name = document.getElementById('comName' + s).value.trim();
      const org = document.getElementById('comOrg' + s).value.trim();
      const email = document.getElementById('comEmail' + s).value.trim();
      const consent = document.getElementById('comConsent' + s).checked;
      const btn = document.getElementById('comSubmit' + s);

      if (!name) { document.getElementById('comName' + s).focus(); return; }
      if (!consent) { alert('メールマガジン配信への同意が必要です'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite"></span>';

      try {
        const res = await fetch('/api/community', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, org, email }),
        });

        if (!res.ok) throw new Error('registration failed');

        document.getElementById('communityForm' + s).style.display = 'none';
        document.getElementById('communitySuccess' + s).style.display = 'block';

        localStorage.setItem(REG_STORAGE_KEY, email);
        if (document.getElementById('regBadge')) {
          document.getElementById('regBadge').style.display = 'inline-block';
        }
        updateRemainingDisplay();
      } catch (e) {
        alert('登録に失敗しました。しばらくしてから再度お試しください。');
        btn.disabled = false;
        btn.textContent = 'コミュニティに参加する';
      }
    }

    function submitCommunity() { submitCommunityForm(''); }
    function submitCommunity2() { submitCommunityForm('2'); }
  </script>
</body>
